<div class="page-header">
    <div class="row">
        <div class="col-sm-7">
            <h2 class="page-title">{{translate 'Ferias'}}</h2>
        </div>
        <div class="col-sm-5 text-right">
            <div class="btn-group">
                <button class="btn btn-primary" data-action="create" type="button">
                    <span class="glyphicon glyphicon-plus"></span>
                    {{translate 'Create Ferias' scope='Ferias'}}
                </button>
            </div>
        </div>
    </div>
</div>

<div class="search-container">
    <div class="row">
        <div class="col-sm-12">
            <div class="input-group">
                <input type="text" class="form-control search-field" placeholder="{{translate 'Search'}}" data-action="search-input">
                <span class="input-group-btn">
                    <button class="btn btn-default" data-action="search" type="button">
                        <span class="glyphicon glyphicon-search"></span>
                    </button>
                </span>
            </div>
        </div>
    </div>
</div>

<div class="filters-container margin-top">
    <div class="row">
        <div class="col-sm-12">
            <div class="btn-group btn-group-sm">
                <button class="btn btn-default filter-btn active" data-filter-preset="all">Todos</button>
                <button class="btn btn-default filter-btn" data-filter-preset="month">Este Mês</button>
                <button class="btn btn-default filter-btn" data-filter-preset="year">Este Ano</button>
            </div>
        </div>
    </div>
</div>

<div class="list-container margin-top">
    <div class="list-content">
        {{{listView}}}
    </div>
</div>

<style>
.ferias-custom-list .table {
    margin-bottom: 0;
    font-size: 13px;
}

.ferias-custom-list .table thead th {
    background-color: #f5f5f5;
    border-top: 1px solid #ddd;
    padding: 10px 12px;
    font-weight: 600;
    color: #333;
}

.ferias-custom-list .table tbody tr {
    transition: background-color 0.15s ease;
}

.ferias-custom-list .table tbody tr:hover {
    background-color: #f9f9f9;
}

.ferias-custom-list .table td {
    padding: 12px;
    vertical-align: middle;
    border-bottom: 1px solid #e3e3e3;
}

.search-container {
    margin: 15px 0;
    padding: 15px;
    background-color: #f9f9f9;
    border-radius: 4px;
}

.filters-container {
    margin: 15px 0;
}

.filter-btn {
    border-radius: 3px;
    margin-right: 5px;
}

.filter-btn.active {
    background-color: #2196F3;
    color: white;
    border-color: #2196F3;
}

.page-header {
    margin: 20px 0;
    padding-bottom: 10px;
    border-bottom: 1px solid #e5e5e5;
}

.page-title {
    margin: 0;
    font-size: 24px;
    font-weight: 300;
}

.list-container {
    background-color: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
}
</style>
